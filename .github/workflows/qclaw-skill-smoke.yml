name: qclaw-skill-smoke

on:
  push:
    branches:
      - main
    paths:
      - "qclaw-skill/**"
      - ".github/workflows/qclaw-skill-smoke.yml"
  pull_request:
    paths:
      - "qclaw-skill/**"
      - ".github/workflows/qclaw-skill-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qclaw-skill
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Start API server
        run: |
          nohup python -m uvicorn server.app:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:8000/v1/health" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time"
          cat uvicorn.log || true
          exit 1

      - name: Run smoke check
        run: python demo/smoke_check.py

      - name: Print server log on failure
        if: failure()
        run: cat uvicorn.log || true

      - name: Stop API server
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
